# One-command sidecar: `docker compose up -d --build`
# It only needs ABS_URL - the address of your Audiobookshelf server AS SEEN FROM THIS
# CONTAINER. With this setup the WATCH only ever talks to the sidecar, so ABS itself
# can stay fully private/internal - it never needs to be exposed to the internet.
#
# ABS_URL is read from a ".env" file next to this one (docker compose loads it
# automatically) - copy .env.example to .env and edit it, or let install.sh do
# that for you. Pick ONE value for ABS_URL, whichever this container can reach:
#   http://host.docker.internal:13378   # ABS runs on the host, not in Docker
#   http://audiobookshelf:13378         # ABS is another compose service (join its network below)
#   https://books.example.com           # ABS is already public (works too; the sidecar sends a UA)
services:
  watchshelf-sidecar:
    build: .
    container_name: watchshelf-sidecar
    environment:
      - ABS_URL=${ABS_URL:-http://host.docker.internal:13378}
      - BIND=0.0.0.0
      - PORT=8081
    extra_hosts:
      # Makes host.docker.internal resolve on native Linux Docker too, not just
      # Docker Desktop (Mac/Windows) - harmless if you don't use that address.
      - "host.docker.internal:host-gateway"
    ports:
      # Bound to all interfaces, not just 127.0.0.1: your reverse proxy (nginx,
      # Apache, Caddy, or a cloudflared instance) very often runs in ITS OWN
      # container or even a separate host on your LAN - it needs to reach this
      # port via the host's real (LAN) IP, not just loopback. This is still
      # only reachable on your local network, not the public internet - only
      # your reverse proxy's own public HTTPS route exposes it further, and
      # that already requires a valid ABS login token to do anything.
      - "8081:8081"
    restart: unless-stopped
    # If ABS runs in Docker on the same host, join its network instead of using the
    # public URL, e.g.:
    # networks: [ audiobookshelf_default ]
